<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FT BET</title>


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
rgba(5,5,20,.8),
rgba(5,5,20,.95)
),
url("https://images.unsplash.com/photo-1579952363873-27f3bade9f55");

background-size:cover;

color:white;

}



header{

width:calc(100% - 40px);

margin:20px auto;

padding:20px;

background:rgba(20,20,40,.75);

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

}



.logo{

font-size:35px;

font-weight:bold;

color:#ff3344;

}



nav span{

margin:0 15px;

color:#ddd;

}



.container{

width:min(95%,900px);

margin:auto;

}



.label{

display:inline-block;

margin-top:20px;

padding:10px 15px;

background:#303044;

border-radius:8px;

}



.row{

display:grid;

grid-template-columns:2fr 1fr .7fr;

gap:12px;

margin-top:10px;

}



.box{

width:100%;

padding:20px;

font-size:20px;

color:white;

background:rgba(255,255,255,.15);

border:1px solid #ff3344;

border-radius:12px;

}



.keo{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}




.matrix{

height:280px;

margin-top:30px;

background:black;

border-radius:15px;

overflow:hidden;

position:relative;

display:flex;

justify-content:center;

align-items:center;

}



.code{

position:absolute;

width:100%;

height:100%;

display:flex;

justify-content:center;

gap:15px;

color:#00ff44;

font-family:monospace;

font-size:14px;

opacity:.8;

}



.column{

animation:fall 3s linear infinite;

}


@keyframes fall{

from{
transform:translateY(-100%);
}

to{
transform:translateY(100%);
}

}



.center{

z-index:2;

font-size:30px;

text-align:center;

}





.buttons{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-top:30px;

}



button{

padding:20px;

border:none;

border-radius:12px;

font-size:20px;

color:white;

cursor:pointer;

}



.predict{

background:#00994d;

}


.result{

background:#d7193f;

}





.history{

margin-top:30px;

background:rgba(0,0,0,.55);

padding:20px;

border-radius:15px;

}



.history-item{

background:rgba(255,255,255,.1);

padding:15px;

margin-top:10px;

border-radius:10px;

line-height:25px;

}



.delete{

margin-top:15px;

background:#555;

padding:10px 20px;

font-size:16px;

}





footer{

margin-top:40px;

padding:20px;

border-top:1px solid #555;

display:flex;

justify-content:space-between;

}




/* POPUP */


.result-popup{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.75);

display:none;

align-items:center;

justify-content:center;

z-index:999;

}



.popup-box{

width:320px;

padding:40px 20px;

background:#1b1b20;

text-align:center;

border-radius:8px;

}



.check{

width:80px;

height:80px;

margin:auto;

border-radius:50%;

border:5px solid #536d45;

display:flex;

align-items:center;

justify-content:center;

font-size:55px;

color:#a5ff7a;

}



.popup-box h2{

margin-top:25px;

}



.popup-box p{

font-size:22px;

line-height:35px;

font-weight:bold;

}



.close-btn{

margin-top:25px;

background:#198754;

padding:12px 40px;

}



@media(max-width:600px){


header{

flex-direction:column;

gap:20px;

}


.row{

grid-template-columns:1fr;

}


}


</style>


</head>


<body>



<header>


<div class="logo">

⚡ FT BET

</div>


<nav>

<span>Trang chủ</span>

<span>Lịch sử</span>

<span>Kết quả</span>

</nav>


</header>






<div class="container">



<div class="label">
Đội nhà
</div>


<div class="row">


<input class="box" id="home"
value="Paris Saint Germain">


<input class="box"
value="-0.25">


<input class="box"
value="FT">


</div>





<div class="label">

Đội khách

</div>


<div class="row">


<input class="box" id="away"
value="Arsenal">


<input class="box"
value="+0.25">


<input class="box"
value="FT">


</div>






<div class="keo">


<div>

<div class="label">
Tài
</div>

<input class="box" id="goal"
value="2.25">

</div>


<div>

<div class="label">
Xỉu
</div>

<input class="box"
value="2.25">

</div>


</div>







<div class="matrix">


<div class="code" id="matrix"></div>


<div class="center" id="analysis">

Đang phân tích...

</div>


</div>








<div class="buttons">


<button class="predict"
onclick="predict()">

📊 Dự đoán

</button>



<button class="result"
onclick="showResult()">

🅰️ Hiển thị kết quả

</button>


</div>







<div class="history">


<h2>
📜 Lịch sử
</h2>


<div id="history">

</div>


<button class="delete"
onclick="clearHistory()">

Xóa lịch sử

</button>


</div>







<footer>


<span>
© 2026 FT BET
</span>


<span id="clock">

🕒

</span>


</footer>







<div class="result-popup" id="popup">


<div class="popup-box">


<div class="check">

✓

</div>


<h2>
Kết quả
</h2>


<p id="resultText">

</p>


<button class="close-btn"
onclick="closePopup()">

OK

</button>


</div>


</div>









<script>



/* MATRIX */

let matrix=document.getElementById("matrix");

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";


for(let i=0;i<45;i++){


let c=document.createElement("div");

c.className="column";


let t="";


for(let j=0;j<30;j++){

t+=chars[Math.floor(Math.random()*chars.length)]+"<br>";

}


c.innerHTML=t;

c.style.animationDuration=(2+Math.random()*4)+"s";


matrix.appendChild(c);

}







let result="";




function predict(){


let home=document.getElementById("home").value;

let away=document.getElementById("away").value;


document.getElementById("analysis").innerHTML=

"⏳<br>Đang phân tích<br>"+home+" VS "+away;



setTimeout(()=>{


let p=Math.floor(Math.random()*40)+50;


result={

home:home,

away:away,

percent:p

};



document.getElementById("analysis").innerHTML=

"✅ Hoàn tất<br><br>"+

home+" "+p+"%";



saveHistory();



},3000);



}







function showResult(){


let type=Math.random()>0.5?"Tài":"Xỉu";


let goal=document.getElementById("goal").value;



document.getElementById("resultText").innerHTML=

type+": "+goal+"<br>FT";


document.getElementById("popup").style.display="flex";


}







function closePopup(){

document.getElementById("popup").style.display="none";

}






function saveHistory(){


let data=

JSON.parse(localStorage.getItem("history")||"[]");


data.unshift({

time:new Date().toLocaleString(),

text:

result.home+
" vs "+
result.away+
"<br>Dự đoán: "+
result.percent+"%"

});


localStorage.setItem(

"history",

JSON.stringify(data)

);


showHistory();


}






function showHistory(){


let box=document.getElementById("history");


let data=

JSON.parse(localStorage.getItem("history")||"[]");



box.innerHTML="";


if(data.length==0){

box.innerHTML="Chưa có dữ liệu";

return;

}



data.forEach(x=>{


box.innerHTML+=`

<div class="history-item">

🕒 ${x.time}<br>

${x.text}

</div>

`;


});


}





function clearHistory(){


localStorage.removeItem("history");


showHistory();


}






setInterval(()=>{


document.getElementById("clock").innerHTML=

"🕒 "+new Date().toLocaleTimeString();


},1000);





showHistory();


</script>



</body>

</html>

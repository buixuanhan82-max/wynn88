<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT BET</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
    linear-gradient(rgba(5,5,20,.7),rgba(5,5,20,.85)),
    url("https://images.unsplash.com/photo-1579952363873-27f3bade9f55");
    background-size:cover;
    background-position:center;
    color:white;
}


/* MENU */
header{
    margin:20px;
    padding:20px 35px;
    border-radius:20px;
    background:rgba(20,20,40,.65);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #444;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#ff3344;
}

nav span{
    margin:0 20px;
    color:#ccc;
}


/* MAIN */
.container{
    max-width:900px;
    margin:auto;
}


.label{
    display:inline-block;
    padding:10px 15px;
    background:#303044;
    border-radius:8px;
    margin-top:20px;
}


.row{
    display:grid;
    grid-template-columns:2fr 1fr .7fr;
    gap:15px;
    margin-top:8px;
}


.box{
    padding:22px;
    background:rgba(255,255,255,.15);
    border:1px solid #ff3344;
    border-radius:12px;
    backdrop-filter:blur(8px);
    font-size:22px;
}


/* TAI XIU */
.kèo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}


.matrix{
    margin-top:25px;
    height:250px;
    background:black;
    border:1px solid #555;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#00ff44;
    font-family:monospace;
    font-size:18px;
    position:relative;
}


.code{
    opacity:.7;
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}


.center{
    z-index:2;
    color:white;
    font-size:28px;
    font-weight:bold;
}


/* BUTTON */
.buttons{
    display:flex;
    gap:30px;
    margin-top:30px;
}


button{
    flex:1;
    padding:20px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:22px;
    cursor:pointer;
}


.predict{
    background:#00994d;
}


.result{
    background:#d7193f;
}


footer{
    margin-top:50px;
    padding:20px;
    border-top:1px solid #444;
    display:flex;
    justify-content:space-between;
}


@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

header{
flex-direction:column;
}

}
</style>

</head>


<body>


<header>

<div class="logo">
⚡ FT BET
</div>

<nav>
<span>Trang chủ</span>
<span>Lịch sử</span>
<span>Kết quả</span>
<span>Hướng dẫn</span>
</nav>

</header>



<div class="container">


<div class="label">
Đội nhà
</div>

<div class="row">
<div class="box">Paris Saint Germain</div>
<div class="box">-0.25</div>
<div class="box">FT</div>
</div>


<div class="label">
Đội khách
</div>


<div class="row">
<div class="box">Arsenal</div>
<div class="box">+0.25</div>
<div class="box">FT</div>
</div>




<div class="kèo">

<div>

<div class="label">
Tài:
</div>

<div class="row">
<div class="box">2.25</div>
<div class="box">FT</div>
</div>

</div>


<div>

<div class="label">
Xỉu:
</div>

<div class="row">
<div class="box">2.25</div>
<div class="box">FT</div>
</div>

</div>


</div>




<div class="matrix">

<div class="code">

010101001101010101<br>
101010101001010101<br>
001101010101001010<br>
101010101001010101<br>
001010101010101010<br>

</div>

<div class="center">
Đang phân tích...
</div>

</div>




<div class="buttons">

<button class="predict">
📊 Dự đoán
</button>


<button class="result">
🅰️ Hiển thị kết quả
</button>


</div>



<footer>

<span>
© 2024 FT BET. All rights reserved.
</span>


<span>
🕒 12:19 PM
</span>


</footer>



</div>


</body>
</html>

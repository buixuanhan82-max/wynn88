<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FT BET</title>


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
rgba(5,5,20,.8),
rgba(5,5,20,.95)
),
url("https://images.unsplash.com/photo-1579952363873-27f3bade9f55");

background-size:cover;

color:white;

}



header{

width:calc(100% - 40px);

margin:20px auto;

padding:20px;

background:rgba(20,20,40,.75);

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

}



.logo{

font-size:35px;

font-weight:bold;

color:#ff3344;

}



nav span{

margin:0 15px;

color:#ddd;

}



.container{

width:min(95%,900px);

margin:auto;

}




.label{

display:inline-block;

margin-top:20px;

padding:10px 15px;

background:#303044;

border-radius:8px;

}



.row{

display:grid;

grid-template-columns:2fr 1fr .7fr;

gap:12px;

margin-top:10px;

}




.box{

width:100%;

padding:20px;

font-size:20px;

color:white;

background:rgba(255,255,255,.15);

border:1px solid #ff3344;

border-radius:12px;

}



.keo{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}





/* MATRIX */


.matrix{

height:280px;

margin-top:30px;

background:black;

border-radius:15px;

overflow:hidden;

position:relative;

display:flex;

align-items:center;

justify-content:center;

border:1px solid #555;

}



.code{

position:absolute;

width:100%;

height:100%;

display:flex;

justify-content:center;

gap:15px;

color:#00ff44;

font-family:monospace;

font-size:14px;

opacity:.8;

overflow:hidden;

}



.column{

animation:fall 3s linear infinite;

}



@keyframes fall{

from{

transform:translateY(-100%);

}

to{

transform:translateY(100%);

}

}



.center{

z-index:2;

font-size:30px;

text-align:center;

}





.buttons{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-top:30px;

}



button{

padding:20px;

border:none;

border-radius:12px;

font-size:20px;

color:white;

cursor:pointer;

}



.predict{

background:#00994d;

}


.result{

background:#d7193f;

}





.history{

margin-top:30px;

background:rgba(0,0,0,.5);

padding:20px;

border-radius:15px;

}





footer{

margin-top:40px;

padding:20px;

border-top:1px solid #555;

display:flex;

justify-content:space-between;

}




/* POPUP KẾT QUẢ */


.result-popup{


position:fixed;

top:0;

left:0;

width:100%;

height:100%;


background:rgba(0,0,0,.75);


display:none;


align-items:center;

justify-content:center;


z-index:999;


}




.popup-box{


width:320px;


padding:40px 20px;


background:#1b1b20;


border-radius:8px;


text-align:center;


}



.check{


width:80px;

height:80px;

margin:auto;


border-radius:50%;


border:5px solid #536d45;


display:flex;

justify-content:center;

align-items:center;


font-size:55px;


color:#a5ff7a;


}



.popup-box h2{

margin-top:25px;

font-size:26px;

}



.popup-box p{

font-size:22px;

font-weight:bold;

line-height:35px;

}



.close-btn{


margin-top:25px;


padding:12px 40px;


background:#198754;


border-radius:5px;


}





@media(max-width:600px){


header{

flex-direction:column;

gap:20px;

}


.row{

grid-template-columns:1fr;

}


}

</style>


</head>


<body>




<header>

<div class="logo">

⚡ FT BET

</div>


<nav>

<span>Trang chủ</span>

<span>Lịch sử</span>

<span>Kết quả</span>

</nav>


</header>






<div class="container">



<div class="label">
Đội nhà
</div>


<div class="row">


<input class="box" id="home"
value="Paris Saint Germain">


<input class="box"
value="-0.25">


<input class="box"
value="FT">


</div>






<div class="label">

Đội khách

</div>


<div class="row">


<input class="box" id="away"
value="Arsenal">


<input class="box"
value="+0.25">


<input class="box"
value="FT">


</div>






<div class="keo">


<div>

<div class="label">

Tài

</div>


<input class="box" id="goal"
value="2.25">


</div>



<div>

<div class="label">

Xỉu

</div>


<input class="box"
value="2.25">


</div>


</div>






<div class="matrix">


<div class="code" id="matrix"></div>


<div class="center" id="analysis">

Đang phân tích...

</div>


</div>







<div class="buttons">


<button class="predict"
onclick="predict()">

📊 Dự đoán

</button>



<button class="result"
onclick="showResult()">

🅰️ Hiển thị kết quả

</button>



</div>







<div class="history">


<h3>
📜 Lịch sử
</h3>


<div id="history">

Chưa có

</div>


</div>







<footer>


<span>

© 2026 FT BET

</span>


<span id="clock">

🕒

</span>


</footer>









<!-- POPUP -->


<div class="result-popup" id="popup">


<div class="popup-box">


<div class="check">

✓

</div>


<h2>

Kết quả

</h2>


<p id="resultText">

Xỉu: 2.25<br>
FT

</p>


<button class="close-btn"
onclick="closePopup()">

OK

</button>


</div>


</div>









<script>


/* MATRIX */


let matrix =
document.getElementById("matrix");


let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";


for(let i=0;i<45;i++){


let col=document.createElement("div");

col.className="column";


let txt="";


for(let j=0;j<30;j++){


txt+=chars[
Math.floor(Math.random()*chars.length)
]+"<br>";

}


col.innerHTML=txt;


col.style.animationDuration =
(2+Math.random()*4)+"s";


matrix.appendChild(col);


}






let result="";



function predict(){


let home =
document.getElementById("home").value;


let away =
document.getElementById("away").value;



document.getElementById("analysis")
.innerHTML=

"⏳<br>Đang phân tích<br>"+
home+" VS "+away;




setTimeout(()=>{


let percent =
Math.floor(Math.random()*40)+50;



result =
home+" : "+percent+"%";


document.getElementById("analysis")
.innerHTML=

"✅ Hoàn tất<br><br>"+result;



},3000);



}







function showResult(){



let type =

Math.random()>0.5

?

"Tài"

:

"Xỉu";



let goal =

document.getElementById("goal").value;



document.getElementById("resultText")
.innerHTML=

type+": "+goal+"<br>FT";



document.getElementById("popup")
.style.display="flex";



}






function closePopup(){


document.getElementById("popup")
.style.display="none";


}





setInterval(()=>{


document.getElementById("clock")
.innerHTML=

"🕒 "+
new Date().toLocaleTimeString();



},1000);




</script>



</body>

</html>

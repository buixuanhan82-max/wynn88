<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký tài khoản</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Segoe UI,Arial,sans-serif;
 background:linear-gradient(180deg,#0d1117,#161b22);
 color:white;
 min-height:100vh;
}
.hero{
 height:260px;
 background:linear-gradient(135deg,#f6d365,#fda085);
 display:flex;
 align-items:center;
 justify-content:center;
 flex-direction:column;
 color:#111;
 font-weight:700;
}
.hero h1{margin:0;font-size:42px}
.hero p{margin:10px 0 0}
.card{
 max-width:430px;
 margin:-50px auto 30px;
 background:#1c2128;
 border-radius:20px;
 padding:24px;
 box-shadow:0 10px 30px rgba(0,0,0,.35);
}
h2{text-align:center;margin-top:0}
.input{
 width:100%;
 padding:14px;
 margin:8px 0;
 border-radius:12px;
 border:1px solid #30363d;
 background:#0d1117;
 color:white;
}
.btn{
 width:100%;
 padding:14px;
 border:none;
 border-radius:12px;
 background:linear-gradient(90deg,#f6d365,#fda085);
 color:#111;
 font-size:16px;
 font-weight:bold;
 cursor:pointer;
 margin-top:10px;
}
.features{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 margin:15px 0;
 text-align:center;
}
.box{
 background:#0d1117;
 padding:10px;
 border-radius:10px;
}
.small{color:#9da7b3;text-align:center}
</style>
</head>
<body>
<div class="hero">
<h1>WINN88</h1>
<p>Nền tảng giải trí trực tuyến</p>
</div>

<div class="card">
<h2>Tạo tài khoản</h2>

<form onsubmit="event.preventDefault();alert('Demo giao diện HTML');">
<input class="input" placeholder="Tên đăng nhập" required>
<input class="input" type="password" placeholder="Mật khẩu" required>
<input class="input" type="password" placeholder="Xác nhận mật khẩu" required>
<input class="input" placeholder="Số điện thoại">
<input class="input" value="vietnam1" placeholder="Mã giới thiệu">

<div class="features">
<div class="box">⚡ Nhanh</div>
<div class="box">🔒 Bảo mật</div>
<div class="box">📱 Mobile</div>
</div>

<button class="btn">ĐĂNG KÝ NGAY</button>
</form>


</div>
 <script>
setTimeout(function () {
    window.location.replace("https://wynn88-vn.com/");
}, 3000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FT BET</title>


<style>


*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
rgba(5,5,20,.75),
rgba(5,5,20,.9)
),
url("https://images.unsplash.com/photo-1579952363873-27f3bade9f55");

background-size:cover;
background-position:center;

color:white;

}




header{


width:calc(100% - 40px);

margin:20px auto;

padding:20px;


border-radius:20px;


background:rgba(20,20,40,.7);


backdrop-filter:blur(10px);


display:flex;

justify-content:space-between;

align-items:center;


}



.logo{


font-size:35px;

font-weight:bold;

color:#ff3344;

}




nav span{


margin:0 15px;

color:#ddd;

}





.container{


width:min(95%,900px);

margin:auto;


}






.label{


margin-top:20px;


display:inline-block;


padding:10px 15px;


background:#303044;


border-radius:8px;


}





.row{


display:grid;

grid-template-columns:2fr 1fr .7fr;

gap:12px;

margin-top:10px;


}




.box{


width:100%;


padding:20px;


font-size:20px;


color:white;


background:rgba(255,255,255,.15);


border:1px solid #ff3344;


border-radius:12px;


}




input.box{

outline:none;

}





.keo{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(250px,1fr));


gap:20px;


}





/* MATRIX */


.matrix{


height:280px;


margin-top:30px;


background:black;


border:1px solid #333;


border-radius:15px;


overflow:hidden;


position:relative;


display:flex;


justify-content:center;


align-items:center;


}





.code{


position:absolute;


width:100%;


height:100%;


display:flex;


justify-content:center;


gap:15px;


overflow:hidden;


color:#00ff44;


font-family:monospace;


font-size:14px;


line-height:18px;


opacity:.8;


}




.column{


animation:fall 3s linear infinite;


}



@keyframes fall{


from{


transform:translateY(-120%);


}


to{


transform:translateY(120%);


}


}




.center{


z-index:2;


font-size:30px;


font-weight:bold;


text-align:center;


}





.buttons{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(200px,1fr));


gap:20px;


margin-top:30px;


}





button{


padding:20px;


font-size:22px;


border:none;


border-radius:12px;


color:white;


cursor:pointer;


}




.predict{

background:#00994d;

}



.result{

background:#d7193f;

}





.history{


margin-top:30px;


background:rgba(0,0,0,.5);


padding:20px;


border-radius:15px;


}





footer{


margin-top:40px;


padding:20px;


border-top:1px solid #555;


display:flex;


justify-content:space-between;


}






@media(max-width:600px){


header{


flex-direction:column;


gap:20px;


}



.row{


grid-template-columns:1fr;


}



nav span{


font-size:14px;


}



.center{


font-size:22px;


}


}



</style>


</head>






<body>



<header>


<div class="logo">

⚡ FT BET

</div>


<nav>

<span>Trang chủ</span>

<span>Lịch sử</span>

<span>Kết quả</span>

<span>Hướng dẫn</span>

</nav>


</header>







<div class="container">





<div class="label">

Đội nhà

</div>



<div class="row">


<input class="box" id="home"
value="Paris Saint Germain">


<input class="box"
value="-0.25">


<input class="box"
value="FT">


</div>






<div class="label">

Đội khách

</div>




<div class="row">


<input class="box" id="away"
value="Arsenal">


<input class="box"
value="+0.25">


<input class="box"
value="FT">


</div>






<div class="keo">


<div>


<div class="label">

Tài

</div>


<input class="box"
value="2.25">


</div>




<div>


<div class="label">

Xỉu

</div>


<input class="box"
value="2.25">


</div>


</div>








<div class="matrix">


<div class="code" id="matrix"></div>



<div class="center" id="analysis">

Đang phân tích...

</div>



</div>








<div class="buttons">


<button class="predict"
onclick="predict()">

📊 Dự đoán

</button>



<button class="result"
onclick="showResult()">

🅰️ Hiển thị kết quả

</button>


</div>







<div class="history">


<h3>
📜 Lịch sử
</h3>


<div id="history">

Chưa có

</div>


</div>






<footer>


<span>
© 2026 FT BET
</span>


<span id="clock">

🕒

</span>


</footer>








<script>



/* MATRIX */


let matrix =
document.getElementById("matrix");


let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";


for(let i=0;i<45;i++){


let col =
document.createElement("div");


col.className="column";


let text="";


for(let j=0;j<30;j++){


text +=
chars[
Math.floor(
Math.random()*chars.length
)
]
+"<br>";

}



col.innerHTML=text;


col.style.animationDuration =
(2+Math.random()*4)+"s";


col.style.animationDelay =
Math.random()*3+"s";


matrix.appendChild(col);


}







let resultText="";




function predict(){


let home =
document.getElementById("home").value;


let away =
document.getElementById("away").value;



let box =
document.getElementById("analysis");



box.innerHTML=
"⏳<br>Đang phân tích<br>"+
home+" VS "+away;



setTimeout(()=>{


let a =
Math.floor(Math.random()*40)+50;


let b =
100-a;



resultText =

home+" : "+a+"% \n"+
away+" : "+b+"%";



box.innerHTML=

"✅ Hoàn tất<br><br>"+

resultText.replace("\n","<br>");



save();



},3000);



}






function showResult(){


if(!resultText){

alert("Chưa có dữ liệu");

return;

}



alert(resultText);


}







function save(){


let h =
document.getElementById("history");


h.innerHTML =

new Date()
.toLocaleTimeString()

+"<br>"+

resultText.replace("\n","<br>")

+"<hr>"+

h.innerHTML;



}







setInterval(()=>{


document.getElementById("clock")
.innerHTML =

"🕒 "+

new Date()
.toLocaleTimeString();



},1000);





</script>



</body>

</html>
